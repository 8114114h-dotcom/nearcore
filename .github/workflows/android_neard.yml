name: Android Build
on: [workflow_dispatch] # لكي تشغله يدوياً متى شئت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup target add aarch64-linux-android
          sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler libssl-dev
      - name: Build
        run: cargo build -p neard --release --target aarch64-linux-android
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: neard-android
          path: target/aarch64-linux-android/release/neard

